<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacro con Cronómetro</title>

<style>
  body {
    margin: 0;
    font-family: 'Century Gothic', sans-serif;
    background-color: #f5f5f5;
  }

  /* Panel inicial y final */
  #panel, #panelFinal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
  }

  #panelContent, #panelFinalContent {
    background-color: #fff;
    width: 400px;
    min-height: 250px;
    padding: 40px 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 25px;
  }

  #panelContent h1,
  #panelContent p,
  #panelFinalContent h1,
  #panelFinalContent p {
    margin: 0;
  }

  #panelContent button {
    font-size: 20px;
    padding: 10px 30px;
    border: none;
    border-radius: 12px;
    background-color: #539444;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  /* BARRA FIJA ABAJO */
  #timer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 10px 0;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #fff;
    background-color: #234c2a; /* verde normal */
    display: none;
    transition: background-color 0.3s ease;
  }

  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: none;
  }
</style>
</head>

<body>

<!-- Panel inicial -->
<div id="panel">
  <div id="panelContent">
    <h1>Simulacro 1</h1>
    <p>Tiempo: 37 minutos</p>
    <button id="startBtn">Abrir</button>
  </div>
</div>

<!-- Panel final -->
<div id="panelFinal" style="display:none;">
  <div id="panelFinalContent">
    <h1>No entregó el examen a tiempo</h1>
    <p>Su prueba fue anulada</p>
  </div>
</div>

<!-- Barra Cronómetro -->
<div id="timer">37:00</div>

<!-- Formulario -->
<iframe id="formFrame" src="https://forms.gle/YS9sS8CwYVa8WYKw6"></iframe>

<script>
  const timerEl = document.getElementById('timer');
  const formFrame = document.getElementById('formFrame');
  const panel = document.getElementById('panel');
  const panelFinal = document.getElementById('panelFinal');

  let tiempoPrincipal = 0.25 * 60;
  let tiempoExtra = 30;
  let enTiempoExtra = false;

  document.getElementById('startBtn').addEventListener('click', () => {
    panel.style.display = 'none';
    formFrame.style.display = 'block';
    timerEl.style.display = 'block';

    let countdown = setInterval(() => {

      function formato(seg) {
        let m = Math.floor(seg / 60);
        let s = seg % 60;
        if (s < 10) s = '0' + s;
        if (m < 10) m = '0' + m;
        return `${m}:${s}`;
      }

      if (!enTiempoExtra) {
        timerEl.textContent = formato(tiempoPrincipal);
        tiempoPrincipal--;

        if (tiempoPrincipal < 0) {
          enTiempoExtra = true;
          timerEl.style.backgroundColor = '#b20404'; // rojo tiempo extra
        }

      } else {
        timerEl.textContent = `El tiempo ha terminado. Si no envía su examen en ${tiempoExtra} segundos, será anulado.`;
        tiempoExtra--;

        if (tiempoExtra < 0) {
          clearInterval(countdown);
          timerEl.style.display = 'none';
          panelFinal.style.display = 'flex';
        }
      }

    }, 1000);
  });
</script>

</body>
</html>
